<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Chatbot — CodeReview AI</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .cb-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 0 28px;
      height: 54px;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    .cb-brand {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--color-primary);
      letter-spacing: -0.3px;
      text-decoration: none;
    }
    .cb-nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.88rem;
    }
    .cb-nav-links a {
      color: var(--color-text);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.15s;
    }
    .cb-nav-links a:hover { opacity: 1; }
    .cb-username {
      font-size: 0.88rem;
      color: var(--color-muted);
    }

    .cb-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 16px 32px;
      gap: 0;
    }

    .cb-file-header {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-bottom: none;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .cb-file-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .cb-file-tab.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .cb-file-tab .cb-file-icon { opacity: 0.7; }
    .cb-file-tab-label {
      font-size: 0.75rem;
      color: var(--color-muted);
      margin-left: 2px;
    }

    .cb-chat-window {
      flex: 1;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-top: none;
      border-bottom: none;
      display: flex;
      flex-direction: column;
      min-height: 440px;
      max-height: 520px;
    }

    .cb-context-banner {
      padding: 10px 20px;
      font-size: 0.78rem;
      color: var(--color-muted);
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cb-context-banner span { color: var(--color-primary); font-weight: 600; }

    .cb-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .cb-empty-hint {
      margin: auto;
      text-align: center;
      color: var(--color-muted);
      font-size: 0.88rem;
      opacity: 0.7;
      user-select: none;
    }
    .cb-empty-hint p { margin-top: 6px; font-size: 0.8rem; }

    .cb-msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 82%;
    }
    .cb-msg.user { align-self: flex-end; align-items: flex-end; }
    .cb-msg.bot  { align-self: flex-start; align-items: flex-start; }

    .cb-bubble {
      padding: 10px 15px;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .cb-msg.user .cb-bubble {
      background: var(--color-primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .cb-msg.bot .cb-bubble {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      border-bottom-left-radius: 4px;
    }
    .cb-msg-meta {
      font-size: 0.7rem;
      color: var(--color-muted);
      padding: 0 4px;
    }

    .cb-typing {
      align-self: flex-start;
      display: none;
      gap: 5px;
      padding: 10px 15px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
    }
    .cb-typing.show { display: inline-flex; }
    .cb-dot {
      width: 7px; height: 7px;
      background: var(--color-muted);
      border-radius: 50%;
      animation: cbBounce 1.2s infinite;
    }
    .cb-dot:nth-child(2) { animation-delay: 0.2s; }
    .cb-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes cbBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .cb-input-bar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-top: 1px solid var(--color-border);
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .cb-input-wrap {
      flex: 1;
      position: relative;
    }
    .cb-input-wrap input {
      width: 100%;
      padding: 11px 16px;
      border: 1px solid var(--color-border);
      border-radius: 24px;
      font-size: 0.875rem;
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .cb-input-wrap input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(19,194,194,.12);
    }
    .cb-input-wrap input::placeholder { color: var(--color-muted); opacity: 0.7; }
    .cb-send-btn {
      flex-shrink: 0;
      padding: 10px 22px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: var(--font);
    }
    .cb-send-btn:hover:not(:disabled) { opacity: 0.9; }
    .cb-send-btn:active:not(:disabled) { transform: scale(0.97); }
    .cb-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .cb-suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
    }
    .cb-suggestion-chip {
      font-size: 0.75rem;
      padding: 5px 11px;
      border: 1px solid var(--color-border);
      border-radius: 14px;
      cursor: pointer;
      color: var(--color-muted);
      background: var(--color-bg);
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }
    .cb-suggestion-chip:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    .cb-error {
      display: none;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 0.82rem;
      color: #c53030;
      margin-bottom: 12px;
    }
    .cb-error.show { display: block; }

    .cb-messages::-webkit-scrollbar { width: 5px; }
    .cb-messages::-webkit-scrollbar-track { background: transparent; }
    .cb-messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    .cb-bubble code {
      background: rgba(0,0,0,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.83em;
      font-family: monospace;
    }
    .cb-bubble pre {
      background: rgba(0,0,0,0.07);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      font-size: 0.82em;
      font-family: monospace;
      margin-top: 6px;
    }

    @media (max-width: 600px) {
      .cb-main { padding: 12px 8px 20px; }
      .cb-msg { max-width: 94%; }
    }
  </style>
</head>
<body>

<nav class="cb-navbar">
  <a class="cb-brand" href="/dashboard">CodeReview AI</a>
  <div class="cb-nav-links">
    <a href="/dashboard">Dashboard</a>
    <span class="cb-username" id="cb-username-label"></span>
    <button class="btn-logout" id="cb-logout-btn" style="font-size:0.82rem; padding:5px 12px;">Logout</button>
  </div>
</nav>

<div class="cb-main">

  <div id="cb-error" class="cb-error"></div>

  <div class="cb-file-header" id="cb-file-tabs">
    <span style="font-size:0.8rem; color:var(--color-muted);">Loading files…</span>
  </div>

  <div class="cb-suggestions" id="cb-suggestions">
    <span class="cb-suggestion-chip" onclick="useSuggestion(this)">Explain this file</span>
    <span class="cb-suggestion-chip" onclick="useSuggestion(this)">What does this code do?</span>
    <span class="cb-suggestion-chip" onclick="useSuggestion(this)">Find potential bugs</span>
    <span class="cb-suggestion-chip" onclick="useSuggestion(this)">Suggest improvements</span>
    <span class="cb-suggestion-chip" onclick="useSuggestion(this)">Generate docstrings</span>
  </div>

  <div class="cb-chat-window">
    <div class="cb-context-banner" id="cb-context-banner">
      <span>📄</span>
      <span id="cb-context-text">Loading context…</span>
    </div>
    <div class="cb-messages" id="cb-messages">
      <div class="cb-empty-hint" id="cb-empty-hint">
        Ask anything about this file…
        <p>e.g. "What does this function do?" or "Find any security issues"</p>
      </div>
      <div class="cb-typing" id="cb-typing">
        <div class="cb-dot"></div>
        <div class="cb-dot"></div>
        <div class="cb-dot"></div>
      </div>
    </div>
  </div>

  <div class="cb-input-bar">
    <div class="cb-input-wrap">
      <input
        type="text"
        id="cb-input"
        placeholder="Ask a question about this file…"
        autocomplete="off"
        maxlength="2000"
      />
    </div>
    <button class="cb-send-btn" id="cb-send-btn" disabled>Ask</button>
  </div>

</div>

<script>
const API   = "http://127.0.0.1:8000";
const token = localStorage.getItem("token");
if (!token) {
  window.location.href = "/login?next=" + encodeURIComponent(window.location.pathname + window.location.search);
}

let currentUser = null;
try { currentUser = JSON.parse(localStorage.getItem("user")); } catch (_) {}
if (!currentUser) {
  window.location.href = "/login?next=" + encodeURIComponent(window.location.pathname + window.location.search);
}

const pathMatch = window.location.pathname.match(/\/project\/(\d+)\/chatbot/);
const projectId = pathMatch ? parseInt(pathMatch[1]) : null;
const params    = new URLSearchParams(window.location.search);
const fileIds   = params.get("files") ? params.get("files").split(",").map(Number).filter(Boolean) : [];

if (!projectId || !fileIds.length) {
  document.body.innerHTML = `<div style="padding:60px; text-align:center; color:#e53e3e; font-size:1rem;">
    Invalid chatbot URL. No project or files specified.<br/>
    <a href="/dashboard" style="color:var(--color-primary); margin-top:12px; display:inline-block;">← Back to Dashboard</a>
  </div>`;
  throw new Error("Missing project/files");
}

let activeFileId   = fileIds[0];
let activeFilename = "";
let conversationHistory = {}; 
let isLoading = false;

fileIds.forEach(id => { conversationHistory[id] = []; });

const messagesEl  = document.getElementById("cb-messages");
const inputEl     = document.getElementById("cb-input");
const sendBtn     = document.getElementById("cb-send-btn");
const typingEl    = document.getElementById("cb-typing");
const errorEl     = document.getElementById("cb-error");
const emptyHint   = document.getElementById("cb-empty-hint");
const contextText = document.getElementById("cb-context-text");
const suggestionsEl = document.getElementById("cb-suggestions");
const tabsEl      = document.getElementById("cb-file-tabs");

document.getElementById("cb-username-label").textContent = "Hello, " + (currentUser.username || "User");
document.getElementById("cb-logout-btn").addEventListener("click", () => {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "/login";
});

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add("show");
  setTimeout(() => errorEl.classList.remove("show"), 5000);
}

async function apiFetch(path, opts = {}) {
  try {
    const res = await fetch(API + path, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token,
        ...(opts.headers || {})
      }
    });
    if (res.status === 401) {
      localStorage.clear();
      window.location.href = "/login";
      return null;
    }
    return res;
  } catch (e) {
    console.error("Network error:", path, e);
    return null;
  }
}

let fileMap = {}; 

async function loadFileTabs() {
  const res = await apiFetch("/projects/" + projectId + "/files");
  if (!res || !res.ok) {
    tabsEl.innerHTML = "<span style='color:var(--color-muted); font-size:0.82rem;'>Failed to load files</span>";
    return;
  }
  const allFiles = await res.json();

  const selected = allFiles.filter(f => fileIds.includes(f.id));

  tabsEl.innerHTML = "";

  if (!selected.length) {
    tabsEl.innerHTML = "<span style='color:var(--color-muted); font-size:0.82rem;'>No files found</span>";
    return;
  }

  selected.forEach(f => {
    fileMap[f.id] = f.filename;

    const tab = document.createElement("div");
    tab.className = "cb-file-tab" + (f.id === activeFileId ? " active" : "");
    tab.dataset.fileId = f.id;
    tab.innerHTML = `<span class="cb-file-icon">📄</span>${esc(f.filename)}`;
    tab.addEventListener("click", () => switchFile(f.id));
    tabsEl.appendChild(tab);
  });

  activeFilename = fileMap[activeFileId] || "file";
  updateContextBanner();
  sendBtn.disabled = false;
}

function switchFile(fileId) {
  if (fileId === activeFileId) return;

  activeFileId   = fileId;
  activeFilename = fileMap[fileId] || "file";


  document.querySelectorAll(".cb-file-tab").forEach(t => {
    t.classList.toggle("active", parseInt(t.dataset.fileId) === fileId);
  });

  updateContextBanner();
  renderConversation(fileId);
}

function updateContextBanner() {
  contextText.innerHTML = `<span>${esc(activeFilename)}</span> — Ask questions about this file's content`;
}

function renderConversation(fileId) {
  const history = conversationHistory[fileId] || [];

  const allMsgs = messagesEl.querySelectorAll(".cb-msg");
  allMsgs.forEach(m => m.remove());

  if (!history.length) {
    if (emptyHint) emptyHint.style.display = "block";
    if (suggestionsEl) suggestionsEl.style.display = "flex";
    return;
  }

  if (emptyHint) emptyHint.style.display = "none";
  if (suggestionsEl) suggestionsEl.style.display = "none";

  history.forEach(msg => appendBubble(msg.role, msg.content, false));
  scrollBottom();
}

function appendBubble(role, content, sources, scroll) {
  if (emptyHint) emptyHint.style.display = "none";
  sources = sources || [];
  if (scroll === undefined) scroll = true;
  if (suggestionsEl && (conversationHistory[activeFileId] || []).length > 0) {
    suggestionsEl.style.display = "none";
  }

  const wrap = document.createElement("div");
  wrap.className = "cb-msg " + (role === "user" ? "user" : "bot");

  const bubble = document.createElement("div");
  bubble.className = "cb-bubble";

  if (role === "bot" || role === "assistant") {
    bubble.innerHTML = renderMarkdown(content);
    
    if (sources && sources.length) {
      const srcDiv = document.createElement("div");
      srcDiv.style.cssText = "margin-top:8px; padding-top:7px; border-top:1px solid rgba(0,0,0,0.09); font-size:0.72rem; color:var(--color-muted);";
      srcDiv.innerHTML = "📎 Context from: " + sources.map(s => `<code style="font-size:0.71rem; background:rgba(0,0,0,0.06); padding:1px 4px; border-radius:3px;">${s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</code>`).join(", ");
      bubble.appendChild(srcDiv);
    }
  } else {
    bubble.textContent = content;
  }

  const meta = document.createElement("div");
  meta.className = "cb-msg-meta";
  meta.textContent = role === "user"
    ? (currentUser.username || "You")
    : "CodeReview AI";

  wrap.appendChild(bubble);
  wrap.appendChild(meta);

  messagesEl.insertBefore(wrap, typingEl);

  if (scroll) scrollBottom();
  return wrap;
}

function renderMarkdown(text) {
  let s = esc(text);
  s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => `<pre>${code.trim()}</pre>`);
  s = s.replace(/`([^`]+)`/g, (_, code) => `<code>${code}</code>`);
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\n/g, "<br/>");
  return s;
}

function scrollBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function setTyping(show) {
  typingEl.classList.toggle("show", show);
  if (show) scrollBottom();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = "";
  isLoading = true;
  sendBtn.disabled = true;
  sendBtn.textContent = "…";

  if (!conversationHistory[activeFileId]) conversationHistory[activeFileId] = [];
  conversationHistory[activeFileId].push({ role: "user", content: text });
  appendBubble("user", text);
  setTyping(true);

  try {
    const res = await apiFetch("/chatbot/ask", {
      method: "POST",
      body: JSON.stringify({
        project_id:   projectId,
        file_id:      activeFileId,
        question:     text,
        history:      conversationHistory[activeFileId].slice(0, -1) // previous turns
      })
    });

    setTyping(false);

    if (!res) {
      showError("Server unreachable. Check that the backend is running.");
      conversationHistory[activeFileId].pop();
    } else if (!res.ok) {
      let errMsg = "Something went wrong.";
      try { const e = await res.json(); errMsg = e.detail || errMsg; } catch (_) {}
      showError(errMsg);
      conversationHistory[activeFileId].pop();
    } else {
      const data = await res.json();
      const answer = data.answer || data.response || "No response received.";
      const sources = data.sources || [];
      conversationHistory[activeFileId].push({ role: "assistant", content: answer });
      appendBubble("bot", answer, sources);
    }
  } catch (e) {
    setTyping(false);
    showError("Unexpected error. Please try again.");
    conversationHistory[activeFileId].pop();
    console.error(e);
  }

  isLoading = false;
  sendBtn.disabled = false;
  sendBtn.textContent = "Ask";
  inputEl.focus();
}

sendBtn.addEventListener("click", sendMessage);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener("input", () => {
  sendBtn.disabled = !inputEl.value.trim() || isLoading;
});

function useSuggestion(chip) {
  inputEl.value = chip.textContent.trim();
  inputEl.focus();
  sendBtn.disabled = false;
}

loadFileTabs();
</script>
</body>
</html>
